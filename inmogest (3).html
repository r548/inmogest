<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InmoGest — Rosario</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#070f1e; --bg2:#0a1628; --bg3:#0f1f3d; --bg4:#162040;
  --border:#1e3a5f; --blue:#2563eb; --blue2:#1d4ed8;
  --text:#e8f0fe; --muted:#7aa3cc; --dim:#4a6fa5;
  --green:#10b981; --yellow:#f59e0b; --red:#ef4444; --purple:#8b5cf6;
}
body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }
#sidebar { width:220px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:100; overflow:hidden; transition:width .25s; }
#sidebar.collapsed { width:56px; }
.logo { padding:16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); }
.logo-icon { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--blue2),var(--blue)); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
nav { flex:1; padding:10px 8px; display:flex; flex-direction:column; gap:2px; overflow-y:auto; }
.nav-btn { display:flex; align-items:center; gap:12px; padding:10px; border-radius:10px; border:none; background:transparent; color:var(--dim); cursor:pointer; width:100%; text-align:left; font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; transition:all .15s; }
.nav-btn:hover { background:#ffffff08; color:var(--muted); }
.nav-btn.active { background:linear-gradient(90deg,var(--blue2),var(--blue)); color:#fff; font-weight:700; }
.nav-icon { font-size:16px; flex-shrink:0; }
.collapse-btn { margin:0 8px 12px; padding:8px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--dim); cursor:pointer; font-size:14px; }
#main { flex:1; margin-left:220px; display:flex; flex-direction:column; transition:margin-left .25s; }
#main.expanded { margin-left:56px; }
.topbar { border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; background:var(--bg2); position:sticky; top:0; z-index:50; }
#content { padding:20px; flex:1; overflow-y:auto; }
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:20px; }
.stat-card { background:linear-gradient(135deg,var(--bg3),var(--bg4)); border:1px solid var(--border); border-radius:14px; padding:16px; }
.card { background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:16px; }
.card-title { font-size:13px; font-weight:700; color:var(--muted); margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { padding:8px 10px; text-align:left; color:var(--dim); font-weight:600; border-bottom:1px solid var(--border); }
td { padding:10px; border-bottom:1px solid #1e3a5f18; vertical-align:middle; }
tr:hover td { background:#ffffff04; }
.badge { border-radius:999px; padding:2px 10px; font-size:11px; font-weight:700; display:inline-block; }
.bg { background:#10b98120; color:var(--green); border:1px solid #10b98140; }
.br { background:#ef444420; color:var(--red); border:1px solid #ef444440; }
.by { background:#f59e0b20; color:var(--yellow); border:1px solid #f59e0b40; }
.bb { background:#2563eb20; color:#60a5fa; border:1px solid #2563eb40; }
.bp { background:#8b5cf620; color:var(--purple); border:1px solid #8b5cf640; }
.btn { padding:7px 16px; border-radius:8px; border:none; cursor:pointer; font-size:12px; font-weight:700; transition:opacity .15s; }
.btn:hover { opacity:.85; }
.btn-p { background:linear-gradient(90deg,var(--blue2),var(--blue)); color:#fff; }
.btn-g { background:transparent; border:1px solid var(--border); color:var(--muted); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn-red { background:#ef444420; color:var(--red); border:1px solid #ef444440; }
.modal-overlay { position:fixed; inset:0; background:#000a; z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; }
.modal { background:var(--bg3); border:1px solid var(--border); border-radius:16px; padding:24px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; }
.modal h3 { font-size:16px; font-weight:800; margin-bottom:20px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:10px; color:var(--muted); font-weight:700; margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; }
.form-group input,.form-group select,.form-group textarea { width:100%; padding:9px 12px; background:var(--bg4); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; outline:none; font-family:inherit; }
.form-group input:focus,.form-group select:focus { border-color:var(--blue); }
.modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:16px; }
.section-header { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin:16px 0 8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.tag { display:inline-block; padding:2px 8px; border-radius:6px; font-size:10px; font-weight:700; }
.tag-inq { background:#2563eb20; color:#60a5fa; }
.tag-due { background:#10b98120; color:var(--green); }
.tag-inm { background:#8b5cf620; color:var(--purple); }
.tag-tra { background:#f59e0b20; color:var(--yellow); }
.servicio-row { display:flex; align-items:center; gap:10px; background:var(--bg4); border-radius:10px; padding:10px 14px; margin-bottom:8px; border:1px solid var(--border); }
.empty { text-align:center; padding:40px; color:var(--dim); }
.loading { text-align:center; padding:40px; color:var(--dim); }
.liq-card { background:var(--bg4); border-radius:14px; padding:18px; margin-bottom:14px; border:1px solid var(--border); }
.liq-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #1e3a5f30; font-size:12px; }
.liq-row:last-child { border-bottom:none; }
.liq-total { display:flex; justify-content:space-between; align-items:center; padding:12px 0 0; margin-top:8px; border-top:2px solid var(--blue); font-size:14px; font-weight:800; }
@media(max-width:700px){
  #sidebar{width:56px;} #sidebar .logo-text,#sidebar .logo-sub,#sidebar .nav-label,#sidebar .collapse-btn{display:none;}
  #main{margin-left:56px;} .form-row{grid-template-columns:1fr;}
  table{font-size:11px;} td,th{padding:6px 5px;}
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">
    <div class="logo-icon">🏡</div>
    <div><div style="font-weight:800;font-size:15px;white-space:nowrap" class="logo-text">InmoGest</div>
    <div style="font-size:10px;color:var(--dim);letter-spacing:1px" class="logo-sub">ROSARIO</div></div>
  </div>
  <nav>
    <button class="nav-btn active" onclick="go('dashboard')"><span class="nav-icon">⊞</span><span class="nav-label">Dashboard</span></button>
    <button class="nav-btn" onclick="go('propiedades')"><span class="nav-icon">🏠</span><span class="nav-label">Propiedades</span></button>
    <button class="nav-btn" onclick="go('servicios')"><span class="nav-icon">💡</span><span class="nav-label">Servicios e Impuestos</span></button>
    <button class="nav-btn" onclick="go('cobranzas')"><span class="nav-icon">💰</span><span class="nav-label">Cobranzas</span></button>
    <button class="nav-btn" onclick="go('liquidaciones')"><span class="nav-icon">📊</span><span class="nav-label">Liquidaciones</span></button>
    <button class="nav-btn" onclick="go('contratos')"><span class="nav-icon">📄</span><span class="nav-label">Contratos</span></button>
    <button class="nav-btn" onclick="go('agenda')"><span class="nav-icon">📅</span><span class="nav-label">Agenda</span></button>
  </nav>
  <button class="collapse-btn" onclick="toggleSide()">◀</button>
</div>

<div id="main">
  <div class="topbar">
    <div>
      <div style="font-size:18px;font-weight:800" id="ptitle">Dashboard</div>
      <div style="font-size:11px;color:var(--dim)" id="pdate"></div>
    </div>
    <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800">R</div>
  </div>
  <div id="content"><div class="loading">⏳ Cargando...</div></div>
</div>

<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3 id="mtitle"></h3>
    <div id="mbody"></div>
    <div class="modal-footer">
      <button class="btn btn-g" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-p" onclick="doSave()">Guardar</button>
    </div>
  </div>
</div>

<script>
const SB = supabase.createClient(
  'https://btuzbnffotmizmtypnfa.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0dXpibmZmb3RtaXptdHlwbmZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MTQyNjMsImV4cCI6MjA5NDk5MDI2M30.s23WU8qAyKNyJ2wDYvqNjIxLtmkhcHCimcB7CGp6lNY'
);

const COMISION = 0.10;
const SERVICIOS_TIPOS = ['EPE (Luz)','ASSA (Agua)','Litoral Gas','TGI','API','Expensas','Otros'];
const PAGADORES = [
  {val:'inquilino_transfiere', label:'Inquilino → transfiere al dueño', tag:'tag-tra'},
  {val:'inquilino', label:'Inquilino (no transfiere)', tag:'tag-inq'},
  {val:'dueno', label:'Dueño directo', tag:'tag-due'},
  {val:'inmobiliaria', label:'Inmobiliaria', tag:'tag-inm'},
];

let saveFn = null;
const $ = id => document.getElementById(id);
const pesos = n => '$' + Number(n||0).toLocaleString('es-AR');
const titles = {dashboard:'Dashboard',propiedades:'Propiedades',servicios:'Servicios e Impuestos',cobranzas:'Cobranzas',liquidaciones:'Liquidaciones',contratos:'Contratos',agenda:'Agenda'};

document.addEventListener('DOMContentLoaded', () => {
  $('pdate').textContent = new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  go('dashboard');
});

function toggleSide() {
  $('sidebar').classList.toggle('collapsed');
  $('main').classList.toggle('expanded');
  $('sidebar').querySelector('.collapse-btn').textContent = $('sidebar').classList.contains('collapsed') ? '▶' : '◀';
}

function go(page) {
  document.querySelectorAll('.nav-btn').forEach(b => { b.classList.toggle('active', b.getAttribute('onclick').includes(`'${page}'`)); });
  $('ptitle').textContent = titles[page];
  $('content').innerHTML = '<div class="loading">⏳ Cargando...</div>';
  pages[page]();
}

function openModal(title, html, fn) {
  $('mtitle').textContent = title;
  $('mbody').innerHTML = html;
  $('modal').style.display = 'flex';
  saveFn = fn;
}
function closeModal() { $('modal').style.display = 'none'; saveFn = null; }
async function doSave() { if(saveFn) await saveFn(); }

function badgePagador(val) {
  const p = PAGADORES.find(x=>x.val===val) || PAGADORES[0];
  return `<span class="tag ${p.tag}">${p.label}</span>`;
}
function badge(estado) {
  const m = {'Al día':'bg','Mora':'br','Disponible':'by','Cobrado':'bg','Pendiente':'by','Vencido':'br'};
  return `<span class="badge ${m[estado]||'bb'}">${estado}</span>`;
}

// ════════════════════════════════════════════════════════════════════
const pages = {

// ── DASHBOARD ────────────────────────────────────────────────────────
async dashboard() {
  const [{data:props},{data:cobr},{data:serv}] = await Promise.all([
    SB.from('propiedades').select('*'),
    SB.from('cobranzas').select('*'),
    SB.from('servicios').select('*'),
  ]);
  const activas=(props||[]).filter(p=>p.estado!=='Disponible').length;
  const mora=(props||[]).filter(p=>p.estado==='Mora').length;
  const ingAlq=(cobr||[]).filter(c=>c.estado==='Cobrado'&&c.tipo==='alquiler').reduce((s,c)=>s+Number(c.monto||0),0);
  const ingServ=(cobr||[]).filter(c=>c.estado==='Cobrado'&&c.tipo==='servicio_transferido').reduce((s,c)=>s+Number(c.monto||0),0);
  const pendiente=(cobr||[]).filter(c=>c.estado==='Pendiente').reduce((s,c)=>s+Number(c.monto||0),0);
  const ocup=(props||[]).length ? Math.round(activas/(props||[]).length*100) : 0;

  $('content').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Alquileres cobrados</div>
        <div style="font-size:22px;font-weight:800;color:var(--green)">${pesos(ingAlq)}</div></div>
      <div class="stat-card"><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Propiedades activas</div>
        <div style="font-size:22px;font-weight:800">${activas}</div></div>
      <div class="stat-card"><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Cobro pendiente</div>
        <div style="font-size:22px;font-weight:800;color:var(--yellow)">${pesos(pendiente)}</div></div>
      <div class="stat-card"><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Ocupación</div>
        <div style="font-size:22px;font-weight:800">${ocup}%</div>
        <div style="margin-top:6px;height:5px;border-radius:3px;background:var(--border)"><div style="width:${ocup}%;height:100%;border-radius:3px;background:var(--blue)"></div></div></div>
    </div>
    ${mora>0?`<div class="card"><div class="card-title">⚠️ En mora</div>
      ${(props||[]).filter(p=>p.estado==='Mora').map(p=>`
      <div style="background:#ef444412;border:1px solid #ef444430;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:center">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0"></div>
        <div><div style="font-size:11px;color:var(--red);font-weight:700">Mora</div>
        <div style="font-size:12px;color:var(--muted)">${p.direccion} — ${p.inquilino||'Sin inquilino'}</div></div>
      </div>`).join('')}</div>`:''}
    <div class="card"><div class="card-title">🏠 Propiedades <button class="btn btn-p btn-sm" onclick="go('propiedades')">Ver todas</button></div>
      ${!(props||[]).length?'<div class="empty">Sin propiedades. Agregá la primera.</div>':
      `<table><thead><tr><th>Dirección</th><th>Propietario</th><th>Inquilino</th><th>Alquiler</th><th>Estado</th></tr></thead><tbody>
      ${(props||[]).slice(0,5).map(p=>`<tr>
        <td><b>${p.direccion}</b><br><small style="color:var(--dim)">${p.tipo||''}</small></td>
        <td style="color:var(--muted)">${p.propietario||'—'}</td>
        <td style="color:var(--muted)">${p.inquilino||'—'}</td>
        <td style="color:var(--green);font-weight:700">${p.alquiler?pesos(p.alquiler):'—'}</td>
        <td>${badge(p.estado)}</td></tr>`).join('')}
      </tbody></table>`}
    </div>`;
},

// ── PROPIEDADES ───────────────────────────────────────────────────────
async propiedades() {
  const {data:props} = await SB.from('propiedades').select('*').order('created_at',{ascending:false});
  $('content').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn btn-p" onclick="formPropiedad()">+ Nueva propiedad</button></div>
    <div class="card"><div class="card-title">Cartera (${(props||[]).length})</div>
      ${!(props||[]).length?'<div class="empty">Sin propiedades aún.</div>':
      `<table><thead><tr><th>Dirección</th><th>Propietario</th><th>Inquilino</th><th>Alquiler</th><th>Vto. Contrato</th><th>Estado</th><th></th></tr></thead><tbody>
      ${(props||[]).map(p=>`<tr>
        <td><b>${p.direccion}</b><br><small style="color:var(--dim)">${p.tipo||''}</small></td>
        <td style="color:var(--muted)">${p.propietario||'—'}</td>
        <td style="color:var(--muted)">${p.inquilino||'—'}</td>
        <td style="color:var(--green);font-weight:700">${p.alquiler?pesos(p.alquiler):'—'}</td>
        <td style="font-size:11px;color:var(--dim)">${p.fecha_vencimiento?new Date(p.fecha_vencimiento+'T12:00').toLocaleDateString('es-AR'):'—'}</td>
        <td>${badge(p.estado)}</td>
        <td style="display:flex;gap:4px">
          <button class="btn btn-g btn-sm" onclick="editProp('${p.id}')">✏️</button>
          <button class="btn btn-red btn-sm" onclick="delProp('${p.id}')">🗑️</button>
        </td></tr>`).join('')}
      </tbody></table>`}
    </div>`;
},

// ── SERVICIOS E IMPUESTOS ─────────────────────────────────────────────
async servicios() {
  const [{data:props},{data:servs}] = await Promise.all([
    SB.from('propiedades').select('*').neq('inquilino','').not('inquilino','is',null),
    SB.from('servicios').select('*, propiedades(direccion,propietario)').order('created_at',{ascending:false}),
  ]);

  $('content').innerHTML = `
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      <button class="btn btn-p" onclick="formServicio()">+ Registrar servicio/impuesto</button>
      <button class="btn btn-g" onclick="go('servicios')">🔄 Actualizar</button>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Leyenda de responsables de pago</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <span class="tag tag-tra">Inquilino → transfiere al dueño</span>
        <span class="tag tag-inq">Inquilino (no transfiere)</span>
        <span class="tag tag-due">Dueño directo</span>
        <span class="tag tag-inm">Inmobiliaria</span>
      </div>
    </div>

    ${!(props||[]).length?'<div class="card"><div class="empty">Sin propiedades con inquilino.</div></div>':
    (props||[]).map(p => {
      const pservs = (servs||[]).filter(s=>s.propiedad_id===p.id);
      return `<div class="card">
        <div class="card-title">
          <span>🏠 ${p.direccion} <small style="color:var(--dim);font-weight:400">— ${p.propietario||''}</small></span>
          <button class="btn btn-p btn-sm" onclick="formServicio('${p.id}')">+ Agregar</button>
        </div>
        ${!pservs.length?'<div style="color:var(--dim);font-size:12px;padding:10px 0">Sin servicios registrados.</div>':
        pservs.map(s=>`
          <div class="servicio-row">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:700">${s.tipo}</div>
              <div style="font-size:11px;color:var(--dim)">Período: ${s.periodo||'—'} · Vto: ${s.vencimiento?new Date(s.vencimiento+'T12:00').toLocaleDateString('es-AR'):'—'}</div>
            </div>
            <div style="font-size:14px;font-weight:800;color:var(--text)">${pesos(s.monto)}</div>
            ${badgePagador(s.pagador)}
            ${s.pagador==='inquilino_transfiere'?'<span class="badge by" style="font-size:10px">↗ Al dueño</span>':''}
            <button class="btn btn-red btn-sm" onclick="delServicio('${s.id}')">🗑️</button>
          </div>`).join('')}
      </div>`;
    }).join('')}`;
},

// ── COBRANZAS ─────────────────────────────────────────────────────────
async cobranzas() {
  const [{data:cobr},{data:props}] = await Promise.all([
    SB.from('cobranzas').select('*, propiedades(direccion)').order('created_at',{ascending:false}),
    SB.from('propiedades').select('*'),
  ]);
  const totalCob=(cobr||[]).filter(c=>c.estado==='Cobrado').reduce((s,c)=>s+Number(c.monto||0),0);
  const totalPend=(cobr||[]).filter(c=>c.estado==='Pendiente').reduce((s,c)=>s+Number(c.monto||0),0);
  const totalMora=(cobr||[]).filter(c=>c.estado==='Mora').reduce((s,c)=>s+Number(c.monto||0),0);

  $('content').innerHTML = `
    <div class="stats-row" style="margin-bottom:14px">
      <div class="stat-card"><div style="font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:6px">COBRADO</div><div style="font-size:20px;font-weight:800;color:var(--green)">${pesos(totalCob)}</div></div>
      <div class="stat-card"><div style="font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:6px">PENDIENTE</div><div style="font-size:20px;font-weight:800;color:var(--yellow)">${pesos(totalPend)}</div></div>
      <div class="stat-card"><div style="font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:6px">EN MORA</div><div style="font-size:20px;font-weight:800;color:var(--red)">${pesos(totalMora)}</div></div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-p" onclick="formCobranza()">+ Registrar cobro</button></div>
    <div class="card"><div class="card-title">Historial de cobranzas</div>
      ${!(cobr||[]).length?'<div class="empty">Sin cobranzas registradas.</div>':
      `<table><thead><tr><th>Propiedad</th><th>Tipo</th><th>Mes</th><th>Monto</th><th>Estado</th><th></th></tr></thead><tbody>
      ${(cobr||[]).map(c=>`<tr>
        <td>${c.propiedades?.direccion||'—'}</td>
        <td><span class="tag ${c.tipo==='alquiler'?'tag-due':c.tipo==='servicio_transferido'?'tag-tra':'tag-inq'}">${c.tipo==='alquiler'?'Alquiler':c.tipo==='servicio_transferido'?'Serv. transferido':'Otro'}</span></td>
        <td style="color:var(--muted)">${c.mes||'—'}</td>
        <td style="font-weight:700">${pesos(c.monto)}</td>
        <td>${badge(c.estado)}</td>
        <td><button class="btn btn-red btn-sm" onclick="delCobr('${c.id}')">🗑️</button></td>
      </tr>`).join('')}
      </tbody></table>`}
    </div>`;
},

// ── LIQUIDACIONES ─────────────────────────────────────────────────────
async liquidaciones() {
  const {data:props} = await SB.from('propiedades').select('*, cobranzas(*), servicios(*)').neq('inquilino','').not('inquilino','is',null);

  $('content').innerHTML = `
    <div class="card" style="margin-bottom:16px;background:var(--bg4)">
      <div style="font-size:12px;color:var(--muted);line-height:1.6">
        <b style="color:var(--text)">¿Cómo se calcula la liquidación?</b><br>
        <span style="color:var(--green)">+ Alquiler cobrado</span> — 
        <span style="color:var(--red)">- Comisión inmobiliaria (10%)</span> — 
        <span style="color:var(--yellow)">+ Servicios que el inquilino paga y transfiere al dueño</span>
      </div>
    </div>
    ${!(props||[]).length?'<div class="card"><div class="empty">Sin propiedades con inquilino.</div></div>':
    (props||[]).map(p => {
      const alqCobr = (p.cobranzas||[]).filter(c=>c.estado==='Cobrado'&&c.tipo==='alquiler').reduce((s,c)=>s+Number(c.monto||0),0);
      const servTransf = (p.servicios||[]).filter(s=>s.pagador==='inquilino_transfiere').reduce((s,sv)=>s+Number(sv.monto||0),0);
      const servDueno = (p.servicios||[]).filter(s=>s.pagador==='dueno').reduce((s,sv)=>s+Number(sv.monto||0),0);
      const servInq = (p.servicios||[]).filter(s=>s.pagador==='inquilino').reduce((s,sv)=>s+Number(sv.monto||0),0);
      const servInmob = (p.servicios||[]).filter(s=>s.pagador==='inmobiliaria').reduce((s,sv)=>s+Number(sv.monto||0),0);
      const comision = alqCobr * COMISION;
      const neto = alqCobr - comision + servTransf;

      return `<div class="liq-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div>
            <div style="font-size:15px;font-weight:800">${p.propietario||'Sin propietario'}</div>
            <div style="font-size:12px;color:var(--dim)">${p.direccion} · Inquilino: ${p.inquilino||'—'}</div>
          </div>
          ${badge(p.estado)}
        </div>

        <div class="liq-row">
          <span style="color:var(--muted)">Alquiler cobrado</span>
          <span style="color:var(--green);font-weight:700">+ ${pesos(alqCobr)}</span>
        </div>
        <div class="liq-row">
          <span style="color:var(--muted)">Comisión inmobiliaria (10%)</span>
          <span style="color:var(--red);font-weight:700">- ${pesos(comision)}</span>
        </div>
        ${servTransf>0?`<div class="liq-row">
          <span style="color:var(--muted)">Servicios inquilino → dueño</span>
          <span style="color:var(--yellow);font-weight:700">+ ${pesos(servTransf)}</span>
        </div>`:''}
        ${servDueno>0?`<div class="liq-row">
          <span style="color:var(--dim);font-size:11px">Servicios a cargo del dueño (info)</span>
          <span style="color:var(--dim);font-size:11px">${pesos(servDueno)}</span>
        </div>`:''}
        ${servInmob>0?`<div class="liq-row">
          <span style="color:var(--dim);font-size:11px">Servicios a cargo inmobiliaria (info)</span>
          <span style="color:var(--dim);font-size:11px">${pesos(servInmob)}</span>
        </div>`:''}

        <div class="liq-total">
          <span>NETO AL PROPIETARIO</span>
          <span style="color:var(--green)">${pesos(neto)}</span>
        </div>

        ${(p.servicios||[]).length>0?`
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
          <div style="font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Detalle de servicios</div>
          ${(p.servicios||[]).map(s=>`
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:4px 0">
              <span style="color:var(--muted)">${s.tipo} · ${s.periodo||'—'}</span>
              <span style="display:flex;gap:6px;align-items:center">
                <span style="font-weight:700">${pesos(s.monto)}</span>
                ${badgePagador(s.pagador)}
              </span>
            </div>`).join('')}
        </div>`:''
        }
      </div>`;
    }).join('')}`;
},

// ── CONTRATOS ─────────────────────────────────────────────────────────
async contratos() {
  const {data:props} = await SB.from('propiedades').select('*').neq('inquilino','').not('inquilino','is',null);
  $('content').innerHTML = `
    <div class="card"><div class="card-title">Contratos vigentes</div>
      ${!(props||[]).length?'<div class="empty">Sin contratos. Agregá propiedades con inquilino.</div>':
      (props||[]).map(p=>`
        <div style="background:var(--bg4);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
            <div><b style="font-size:14px">${p.direccion}</b><br>
              <small style="color:var(--dim)">Inquilino: ${p.inquilino} · Propietario: ${p.propietario||'—'}</small></div>
            ${badge(p.estado)}
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px">
            ${[
              ['Alquiler',pesos(p.alquiler||0),'var(--green)'],
              ['Vencimiento',p.fecha_vencimiento?new Date(p.fecha_vencimiento+'T12:00').toLocaleDateString('es-AR'):'—','var(--text)'],
              ['Índice',p.indice||'ICL','#60a5fa'],
              ['Comisión','10%','var(--yellow)'],
            ].map(([l,v,c])=>`
              <div style="background:var(--bg3);border-radius:8px;padding:10px">
                <div style="font-size:9px;color:var(--dim);margin-bottom:3px;text-transform:uppercase">${l}</div>
                <div style="font-weight:800;color:${c}">${v}</div>
              </div>`).join('')}
          </div>
        </div>`).join('')}

},

// ── AGENDA ────────────────────────────────────────────────────────────
async agenda() {
  const hoy = new Date().toISOString().split('T')[0];
  const {data:eventos} = await SB.from('agenda').select('*, propiedades(direccion)').order('fecha').order('hora');
  const hoyEvt=(eventos||[]).filter(e=>e.fecha===hoy);
  const prox=(eventos||[]).filter(e=>e.fecha>hoy).slice(0,8);
  const cols = {'Visita':'#3b82f6','Firma':'#10b981','Entrega de llaves':'#f59e0b','Inspección':'#8b5cf6','Otro':'#94a3b8'};

  $('content').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-p" onclick="formAgenda()">+ Nuevo evento</button></div>
    <div class="card"><div class="card-title">📅 Hoy — ${new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div>
      ${!hoyEvt.length?'<div style="color:var(--dim);font-size:12px;padding:8px 0">Sin eventos hoy.</div>':
      hoyEvt.map(e=>{const c=cols[e.tipo]||'#94a3b8';return`
        <div style="display:flex;gap:12px;align-items:center;border-left:3px solid ${c};padding-left:12px;margin-bottom:12px">
          <div style="font-size:12px;color:${c};font-weight:700;min-width:42px">${e.hora?.slice(0,5)||'—'}</div>
          <div style="flex:1"><b>${e.tipo}</b> · ${e.descripcion||''}<br>
            <small style="color:var(--dim)">👤 ${e.cliente||'—'} ${e.propiedades?'· '+e.propiedades.direccion:''}</small></div>
          <button class="btn btn-red btn-sm" onclick="delAgenda('${e.id}')">🗑️</button>
        </div>`}).join('')}
    </div>
    ${prox.length?`<div class="card"><div class="card-title">📆 Próximos eventos</div>
      ${prox.map(e=>{const c=cols[e.tipo]||'#94a3b8';return`
        <div style="display:flex;gap:12px;align-items:center;border-left:3px solid ${c};padding-left:12px;margin-bottom:10px">
          <div style="font-size:11px;color:${c};font-weight:700;min-width:60px">${new Date(e.fecha+'T12:00').toLocaleDateString('es-AR',{day:'numeric',month:'short'})}</div>
          <div><b>${e.tipo}</b><br><small style="color:var(--dim)">${e.descripcion||''} ${e.propiedades?'· '+e.propiedades.direccion:''}</small></div>
        </div>`}).join('')}
    </div>`:``}`;
}
};

// ════════════════════════════════════════════════════════════════════
// FORMULARIOS
// ════════════════════════════════════════════════════════════════════

function formPropiedad(d={}) {
  openModal(d.id?'Editar propiedad':'Nueva propiedad', `
    <div class="form-row">
      <div class="form-group" style="grid-column:1/-1"><label>Dirección *</label><input id="fd" value="${d.direccion||''}" placeholder="Ej: Corrientes 1540 3°A"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Tipo</label><select id="ft">
        ${['Departamento','Casa','Local','Oficina','Cochera'].map(t=>`<option ${d.tipo===t?'selected':''}>${t}</option>`).join('')}
      </select></div>
      <div class="form-group"><label>Estado</label><select id="fes">
        ${['Al día','Mora','Disponible'].map(e=>`<option ${d.estado===e?'selected':''}>${e}</option>`).join('')}
      </select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Propietario</label><input id="fpr" value="${d.propietario||''}" placeholder="Apellido, Nombre"></div>
      <div class="form-group"><label>Inquilino</label><input id="fi" value="${d.inquilino||''}" placeholder="Apellido, Nombre"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Alquiler mensual $</label><input id="fa" type="number" value="${d.alquiler||''}"></div>
      <div class="form-group"><label>Vencimiento contrato</label><input id="fv" type="date" value="${d.fecha_vencimiento||''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Índice ajuste</label><select id="fix">
        ${['ICL','IPC','ICL/IPC'].map(e=>`<option ${d.indice===e?'selected':''}>${e}</option>`).join('')}
      </select></div>
      <div class="form-group"><label>Descuenta impuestos en liquidación</label><select id="fdi">
        <option value="false" ${!d.descuenta_impuestos?'selected':''}>No</option>
        <option value="true" ${d.descuenta_impuestos?'selected':''}>Sí</option>
      </select></div>
    </div>`,
    async () => {
      const row = {
        direccion:$('fd').value, tipo:$('ft').value,
        propietario:$('fpr').value, inquilino:$('fi').value,
        alquiler:$('fa').value||0, estado:$('fes').value,
        fecha_vencimiento:$('fv').value||null,
        indice:$('fix').value,
        descuenta_impuestos:$('fdi').value==='true',
      };
      if(!row.direccion){alert('La dirección es obligatoria');return;}
      const {error} = d.id ? await SB.from('propiedades').update(row).eq('id',d.id)
                           : await SB.from('propiedades').insert(row);
      if(error){alert('Error: '+error.message);return;}
      closeModal(); go('propiedades');
    }
  );
}
async function editProp(id) {
  const {data} = await SB.from('propiedades').select('*').eq('id',id).single();
  formPropiedad(data);
}
async function delProp(id) {
  if(!confirm('¿Eliminar esta propiedad?'))return;
  await SB.from('propiedades').delete().eq('id',id);
  go('propiedades');
}

async function formServicio(propId='') {
  const {data:props} = await SB.from('propiedades').select('id,direccion');
  openModal('Registrar servicio / impuesto', `
    <div class="form-group"><label>Propiedad</label><select id="fsp">
      <option value="">-- Seleccioná --</option>
      ${(props||[]).map(p=>`<option value="${p.id}" ${p.id===propId?'selected':''}>${p.direccion}</option>`).join('')}
    </select></div>
    <div class="form-row">
      <div class="form-group"><label>Tipo de servicio</label><select id="fst">
        ${SERVICIOS_TIPOS.map(t=>`<option>${t}</option>`).join('')}
      </select></div>
      <div class="form-group"><label>Período (ej: Mayo 2026)</label><input id="fsper" placeholder="Mayo 2026"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Monto $</label><input id="fsm" type="number" placeholder="0"></div>
      <div class="form-group"><label>Vencimiento</label><input id="fsv" type="date"></div>
    </div>
    <div class="form-group"><label>¿Quién paga?</label><select id="fspag">
      ${PAGADORES.map(p=>`<option value="${p.val}">${p.label}</option>`).join('')}
    </select></div>
    <div style="background:var(--bg4);border-radius:10px;padding:12px;font-size:11px;color:var(--muted);margin-top:4px">
      <b style="color:var(--text)">Guía rápida:</b><br>
      • <b>Inquilino → transfiere al dueño:</b> EPE, ASSA, Gas que paga el inquilino pero el dueño lo cobre vía inmobiliaria<br>
      • <b>Inquilino (no transfiere):</b> servicios que paga el inquilino directamente<br>
      • <b>Dueño directo:</b> TGI, API, expensas a cargo del propietario<br>
      • <b>Inmobiliaria:</b> gastos que absorbe la inmobiliaria
    </div>`,
    async () => {
      if(!$('fsp').value){alert('Seleccioná una propiedad');return;}
      const {error} = await SB.from('servicios').insert({
        propiedad_id:$('fsp').value, tipo:$('fst').value,
        periodo:$('fsper').value, monto:$('fsm').value||0,
        vencimiento:$('fsv').value||null, pagador:$('fspag').value,
      });
      if(error){alert('Error: '+error.message);return;}
      closeModal(); go('servicios');
    }
  );
}
async function delServicio(id){
  if(!confirm('¿Eliminar?'))return;
  await SB.from('servicios').delete().eq('id',id);
  go('servicios');
}

async function formCobranza(){

  openModal('Registrar cobro', `
    <div class="form-group"><label>Propiedad</label><select id="fcp">
      <option value="">-- Seleccioná --</option>
      ${(props||[]).map(p=>`<option value="${p.id}">${p.direccion}</option>`).join('')}
    </select></div>
    <div class="form-row">
      <div class="form-group"><label>Tipo de cobro</label><select id="fct">
        <option value="alquiler">Alquiler</option>
        <option value="servicio_transferido">Servicio transferido (inquilino→dueño)</option>
        <option value="otro">Otro</option>
      </select></div>
      <div class="form-group"><label>Mes</label><input id="fcm" placeholder="Mayo 2026"></div>

}
async function delCobr(id){
  if(!confirm('¿Eliminar?'))return;
  await SB.from('cobranzas').delete().eq('id',id);
  go('cobranzas');
}

async function formAgenda(){
  const {data:props} = await SB.from('propiedades').select('id,direccion');
  openModal('Nuevo evento', `
    <div class="form-row">
      <div class="form-group"><label>Tipo</label><select id="fat">
        ${['Visita','Firma','Entrega de llaves','Inspección','Otro'].map(t=>`<option>${t}</option>`).join('')}
      </select></div>
      <div class="form-group"><label>Cliente</label><input id="fac" placeholder="Apellido, Nombre"></div>
    </div>

      <div class="form-group"><label>Fecha</label><input id="fafe" type="date"></div>
      <div class="form-group"><label>Hora</label><input id="faho" type="time"></div>

}
async function delAgenda(id){
  if(!confirm('¿Eliminar?'))return;
  await SB.from('agenda').delete().eq('id',id);

}
