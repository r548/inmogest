<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InmoGest — Rosario</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #070f1e; --bg2: #0a1628; --bg3: #0f1f3d; --bg4: #162040;
    --border: #1e3a5f; --blue: #2563eb; --blue2: #1d4ed8;
    --text: #e8f0fe; --muted: #7aa3cc; --dim: #4a6fa5;
    --green: #10b981; --yellow: #f59e0b; --red: #ef4444; --purple: #8b5cf6;
  }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
  
  /* SIDEBAR */
  #sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width .25s; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; overflow: hidden; }
  #sidebar.collapsed { width: 56px; }
  .logo { padding: 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
  .logo-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--blue2), var(--blue)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .logo-text { font-weight: 800; font-size: 15px; white-space: nowrap; }
  .logo-sub { font-size: 10px; color: var(--dim); letter-spacing: 1px; }
  nav { flex: 1; padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
  .nav-btn { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 10px; border: none; background: transparent; color: var(--dim); cursor: pointer; width: 100%; text-align: left; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; transition: all .15s; }
  .nav-btn:hover { background: #ffffff08; color: var(--muted); }
  .nav-btn.active { background: linear-gradient(90deg, var(--blue2), var(--blue)); color: #fff; font-weight: 700; }
  .nav-icon { font-size: 16px; flex-shrink: 0; }
  .collapse-btn { margin: 0 8px 12px; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--dim); cursor: pointer; font-size: 14px; }

  /* MAIN */
  #main { flex: 1; margin-left: 220px; display: flex; flex-direction: column; transition: margin-left .25s; min-width: 0; }
  #main.expanded { margin-left: 56px; }
  .topbar { border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; background: var(--bg2); position: sticky; top: 0; z-index: 50; }
  .topbar-title { font-size: 18px; font-weight: 800; }
  .topbar-sub { font-size: 11px; color: var(--dim); }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--purple)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; }
  #content { padding: 20px; flex: 1; overflow-y: auto; }

  /* CARDS */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .stat-card { background: linear-gradient(135deg, var(--bg3), var(--bg4)); border: 1px solid var(--border); border-radius: 14px; padding: 16px; position: relative; overflow: hidden; }
  .stat-label { color: var(--dim); font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-val { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .stat-delta { font-size: 11px; color: var(--green); }

  /* TABLE */
  .card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { padding: 8px 10px; text-align: left; color: var(--dim); font-weight: 600; border-bottom: 1px solid var(--border); }
  td { padding: 10px; border-bottom: 1px solid #1e3a5f18; }
  tr:hover td { background: #ffffff04; }
  
  /* BADGE */
  .badge { border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 700; display: inline-block; }
  .badge-green { background: #10b98120; color: var(--green); border: 1px solid #10b98140; }
  .badge-red { background: #ef444420; color: var(--red); border: 1px solid #ef444440; }
  .badge-yellow { background: #f59e0b20; color: var(--yellow); border: 1px solid #f59e0b40; }
  .badge-blue { background: #2563eb20; color: #60a5fa; border: 1px solid #2563eb40; }

  /* BUTTONS */
  .btn { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: linear-gradient(90deg, var(--blue2), var(--blue)); color: #fff; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: #000a; z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: var(--bg3); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 800; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .form-group input, .form-group select { width: 100%; padding: 10px 12px; background: var(--bg4); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: var(--blue); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* ALERTS */
  .alert-item { background: #10b98112; border: 1px solid #10b98130; border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .alert-title { font-size: 11px; font-weight: 700; }
  .alert-desc { font-size: 11px; color: var(--muted); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    #sidebar { width: 56px; }
    #sidebar .logo-text, #sidebar .nav-btn span:not(.nav-icon), #sidebar .collapse-btn { display: none; }
    #main { margin-left: 56px; }
    #main.expanded { margin-left: 56px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    table { font-size: 11px; }
    td, th { padding: 7px 6px; }
  }

  .loading { text-align: center; padding: 40px; color: var(--dim); }
  .empty { text-align: center; padding: 40px; color: var(--dim); }
  .empty-icon { font-size: 36px; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <div class="logo-icon">🏡</div>
    <div>
      <div class="logo-text">InmoGest</div>
      <div class="logo-sub">ROSARIO</div>
    </div>
  </div>
  <nav>
    <button class="nav-btn active" onclick="navigate('dashboard')"><span class="nav-icon">⊞</span><span>Dashboard</span></button>
    <button class="nav-btn" onclick="navigate('propiedades')"><span class="nav-icon">🏠</span><span>Propiedades</span></button>
    <button class="nav-btn" onclick="navigate('contratos')"><span class="nav-icon">📄</span><span>Contratos</span></button>
    <button class="nav-btn" onclick="navigate('cobranzas')"><span class="nav-icon">💰</span><span>Cobranzas</span></button>
    <button class="nav-btn" onclick="navigate('liquidaciones')"><span class="nav-icon">📊</span><span>Liquidaciones</span></button>
    <button class="nav-btn" onclick="navigate('agenda')"><span class="nav-icon">📅</span><span>Agenda</span></button>
  </nav>
  <button class="collapse-btn" onclick="toggleSidebar()">◀</button>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-sub" id="page-date"></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <div class="avatar">R</div>
    </div>
  </div>
  <div id="content"><div class="loading">⏳ Cargando...</div></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3 id="modal-title">Nueva propiedad</h3>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitModal()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ─── SUPABASE ───────────────────────────────────────────────────────────────
const SUPA_URL = 'https://bvykayaxmbrpeknxpanv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2eWtheWF4bWJycGVrbnhwYW52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMjg3MDcsImV4cCI6MjA5NDkwNDcwN30.Jq9mwH4VoNqx7eAP0oLRhmHzJfydgyk0yhREPYDXqo8';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentPage = 'dashboard';
let modalAction = null;

// ─── INIT ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  document.getElementById('page-date').textContent = now.toLocaleDateString('es-AR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  navigate('dashboard');
});

function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const m = document.getElementById('main');
  const btn = s.querySelector('.collapse-btn');
  s.classList.toggle('collapsed');
  m.classList.toggle('expanded');
  btn.textContent = s.classList.contains('collapsed') ? '▶' : '◀';
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.getAttribute('onclick').includes(page)) b.classList.add('active');
  });
  const titles = { dashboard:'Dashboard', propiedades:'Propiedades', contratos:'Contratos', cobranzas:'Cobranzas', liquidaciones:'Liquidaciones', agenda:'Agenda' };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('content').innerHTML = '<div class="loading">⏳ Cargando...</div>';
  pages[page]();
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const pesos = n => '$' + Number(n||0).toLocaleString('es-AR');
function badge(estado) {
  const map = { 'Al día':'green', 'Mora':'red', 'Disponible':'yellow', 'Cobrado':'green', 'Pendiente':'yellow', 'Mora':'red', 'Vencido':'red' };
  return `<span class="badge badge-${map[estado]||'blue'}">${estado}</span>`;
}
function openModal(title, bodyHTML, action) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal').style.display = 'flex';
  modalAction = action;
}
function closeModal() { document.getElementById('modal').style.display = 'none'; modalAction = null; }
async function submitModal() { if (modalAction) await modalAction(); }

// ─── PAGES ───────────────────────────────────────────────────────────────────
const pages = {

  // DASHBOARD
  async dashboard() {
    const [{ data: props }, { data: cobr }] = await Promise.all([
      sb.from('propiedades').select('*'),
      sb.from('cobranzas').select('*')
    ]);
    const activas = (props||[]).filter(p => p.estado !== 'Disponible').length;
    const disponibles = (props||[]).filter(p => p.estado === 'Disponible').length;
    const mora = (props||[]).filter(p => p.estado === 'Mora').length;
    const ingreso = (cobr||[]).filter(c => c.estado === 'Cobrado').reduce((s,c) => s + Number(c.monto||0), 0);
    const pendiente = (cobr||[]).filter(c => c.estado === 'Pendiente').reduce((s,c) => s + Number(c.monto||0), 0);
    const ocupacion = (props||[]).length ? Math.round(activas / (props||[]).length * 100) : 0;

    document.getElementById('content').innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Ingresos cobrados</div><div class="stat-val" style="color:var(--green)">${pesos(ingreso)}</div><div class="stat-delta">Mes actual</div></div>
        <div class="stat-card"><div class="stat-label">Propiedades activas</div><div class="stat-val">${activas}</div><div class="stat-delta">${disponibles} disponible${disponibles!==1?'s':''}</div></div>
        <div class="stat-card"><div class="stat-label">Pendiente cobro</div><div class="stat-val" style="color:var(--yellow)">${pesos(pendiente)}</div><div class="stat-delta">A gestionar</div></div>
        <div class="stat-card"><div class="stat-label">Ocupación</div><div class="stat-val">${ocupacion}%</div>
          <div style="margin-top:6px;height:5px;border-radius:3px;background:var(--border)"><div style="width:${ocupacion}%;height:100%;border-radius:3px;background:var(--blue)"></div></div>
        </div>
      </div>

      ${mora > 0 ? `<div class="card">
        <div class="card-title">⚠️ Alertas</div>
        ${(props||[]).filter(p=>p.estado==='Mora').map(p=>`
          <div class="alert-item" style="background:#ef444412;border-color:#ef444430">
            <div class="alert-dot" style="background:var(--red)"></div>
            <div><div class="alert-title" style="color:var(--red)">En mora</div><div class="alert-desc">${p.direccion} — ${p.inquilino||'Sin inquilino'}</div></div>
          </div>`).join('')}
      </div>` : ''}

      <div class="card">
        <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
          🏠 Propiedades
          <button class="btn btn-primary btn-sm" onclick="navigate('propiedades')">Ver todas</button>
        </div>
        ${(props||[]).length === 0 ? '<div class="empty"><div class="empty-icon">🏠</div><div>Sin propiedades. Agregá la primera.</div></div>' :
        `<table><thead><tr><th>Dirección</th><th>Inquilino</th><th>Alquiler</th><th>Estado</th></tr></thead><tbody>
          ${(props||[]).slice(0,5).map(p=>`<tr>
            <td><b>${p.direccion}</b><br><small style="color:var(--dim)">${p.tipo||''}</small></td>
            <td style="color:var(--muted)">${p.inquilino||'—'}</td>
            <td style="color:var(--green);font-weight:700">${p.alquiler ? pesos(p.alquiler) : '—'}</td>
            <td>${badge(p.estado)}</td>
          </tr>`).join('')}
        </tbody></table>`}
      </div>`;
  },

  // PROPIEDADES
  async propiedades() {
    const { data: props } = await sb.from('propiedades').select('*').order('created_at', { ascending: false });
    document.getElementById('content').innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
        <button class="btn btn-primary" onclick="formPropiedad()">+ Nueva propiedad</button>
      </div>
      <div class="card">
        <div class="card-title">Cartera de propiedades (${(props||[]).length})</div>
        ${(props||[]).length === 0 ? '<div class="empty"><div class="empty-icon">🏠</div><div>Sin propiedades aún.</div></div>' :
        `<table><thead><tr><th>Dirección</th><th>Propietario</th><th>Inquilino</th><th>Alquiler</th><th>Estado</th><th></th></tr></thead><tbody>
          ${(props||[]).map(p=>`<tr>
            <td><b>${p.direccion}</b><br><small style="color:var(--dim)">${p.tipo||''}</small></td>
            <td style="color:var(--muted)">${p.propietario||'—'}</td>
            <td style="color:var(--muted)">${p.inquilino||'—'}</td>
            <td style="color:var(--green);font-weight:700">${p.alquiler ? pesos(p.alquiler) : '—'}</td>
            <td>${badge(p.estado)}</td>
            <td><button class="btn btn-ghost btn-sm" onclick="editPropiedad('${p.id}')">✏️</button>
                <button class="btn btn-ghost btn-sm" onclick="deletePropiedad('${p.id}')">🗑️</button></td>
          </tr>`).join('')}
        </tbody></table>`}
      </div>`;
  },

  // CONTRATOS
  async contratos() {
    const { data: props } = await sb.from('propiedades').select('*').neq('inquilino', '').not('inquilino', 'is', null);
    document.getElementById('content').innerHTML = `
      <div class="card">
        <div class="card-title">Contratos vigentes</div>
        ${(props||[]).length === 0 ? '<div class="empty"><div class="empty-icon">📄</div><div>Sin contratos. Agregá propiedades con inquilino.</div></div>' :
        (props||[]).map(p=>`
          <div style="background:var(--bg4);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
              <div><b style="font-size:14px">${p.direccion}</b><br><small style="color:var(--dim)">Inquilino: ${p.inquilino}</small></div>
              ${badge(p.estado)}
            </div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
              <div style="background:var(--bg3);border-radius:8px;padding:10px">
                <div style="font-size:10px;color:var(--dim);margin-bottom:4px">ALQUILER</div>
                <div style="font-weight:800;color:var(--green)">${pesos(p.alquiler)}</div>
              </div>
              <div style="background:var(--bg3);border-radius:8px;padding:10px">
                <div style="font-size:10px;color:var(--dim);margin-bottom:4px">VENCIMIENTO</div>
                <div style="font-weight:700">${p.fecha_vencimiento ? new Date(p.fecha_vencimiento).toLocaleDateString('es-AR') : '—'}</div>
              </div>
              <div style="background:var(--bg3);border-radius:8px;padding:10px">
                <div style="font-size:10px;color:var(--dim);margin-bottom:4px">ÍNDICE</div>
                <div style="font-weight:700">${p.indice||'ICL'}</div>
              </div>
            </div>
          </div>`).join('')}
      </div>`;
  },

  // COBRANZAS
  async cobranzas() {
    const { data: cobr } = await sb.from('cobranzas').select('*, propiedades(direccion)').order('created_at', { ascending: false });
    const cobrado = (cobr||[]).filter(c=>c.estado==='Cobrado').reduce((s,c)=>s+Number(c.monto||0),0);
    const pendiente = (cobr||[]).filter(c=>c.estado==='Pendiente').reduce((s,c)=>s+Number(c.monto||0),0);
    const mora = (cobr||[]).filter(c=>c.estado==='Mora').reduce((s,c)=>s+Number(c.monto||0),0);
    document.getElementById('content').innerHTML = `
      <div class="stats-row" style="margin-bottom:16px">
        <div class="stat-card"><div class="stat-label">Cobrado</div><div class="stat-val" style="color:var(--green)">${pesos(cobrado)}</div></div>
        <div class="stat-card"><div class="stat-label">Pendiente</div><div class="stat-val" style="color:var(--yellow)">${pesos(pendiente)}</div></div>
        <div class="stat-card"><div class="stat-label">En mora</div><div class="stat-val" style="color:var(--red)">${pesos(mora)}</div></div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn btn-primary" onclick="formCobranza()">+ Registrar cobro</button>
      </div>
      <div class="card">
        <div class="card-title">Historial de cobranzas</div>
        ${(cobr||[]).length === 0 ? '<div class="empty"><div class="empty-icon">💰</div><div>Sin cobranzas registradas.</div></div>' :
        `<table><thead><tr><th>Propiedad</th><th>Mes</th><th>Monto</th><th>Estado</th><th></th></tr></thead><tbody>
          ${(cobr||[]).map(c=>`<tr>
            <td>${c.propiedades?.direccion||'—'}</td>
            <td style="color:var(--muted)">${c.mes||'—'}</td>
            <td style="font-weight:700">${pesos(c.monto)}</td>
            <td>${badge(c.estado)}</td>
            <td><button class="btn btn-ghost btn-sm" onclick="deleteCobranza('${c.id}')">🗑️</button></td>
          </tr>`).join('')}
        </tbody></table>`}
      </div>`;
  },

  // LIQUIDACIONES
  async liquidaciones() {
    const { data: props } = await sb.from('propiedades').select('*, cobranzas(*)').neq('inquilino','').not('inquilino','is',null);
    const COMISION = 0.05;
    document.getElementById('content').innerHTML = `
      <div class="card">
        <div class="card-title">Liquidaciones a propietarios</div>
        ${(props||[]).length === 0 ? '<div class="empty"><div class="empty-icon">📊</div><div>Sin propiedades con inquilino.</div></div>' :
        (props||[]).map(p=>{
          const cobrado = (p.cobranzas||[]).filter(c=>c.estado==='Cobrado').reduce((s,c)=>s+Number(c.monto||0),0);
          const comision = cobrado * COMISION;
          const neto = cobrado - comision;
          return `<div style="background:var(--bg4);border-radius:12px;padding:16px;margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;margin-bottom:12px">
              <div><b>${p.propietario||'Sin propietario'}</b><br><small style="color:var(--dim)">${p.direccion}</small></div>
              <span style="font-size:11px;color:var(--dim)">5% comisión</span>
            </div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
              <div style="background:var(--bg3);border-radius:8px;padding:10px">
                <div style="font-size:9px;color:var(--dim);margin-bottom:3px">COBRADO</div>
                <div style="font-weight:800;font-size:13px">${pesos(cobrado)}</div>
              </div>
              <div style="background:var(--bg3);border-radius:8px;padding:10px">
                <div style="font-size:9px;color:var(--dim);margin-bottom:3px">COMISIÓN</div>
                <div style="font-weight:800;font-size:13px;color:var(--red)">- ${pesos(comision)}</div>
              </div>
              <div style="background:var(--bg3);border-radius:8px;padding:10px">
                <div style="font-size:9px;color:var(--dim);margin-bottom:3px">NETO</div>
                <div style="font-weight:800;font-size:13px;color:var(--green)">${pesos(neto)}</div>
              </div>
            </div>
          </div>`;}).join('')}
      </div>`;
  },

  // AGENDA
  async agenda() {
    const hoy = new Date().toISOString().split('T')[0];
    const { data: eventos } = await sb.from('agenda').select('*, propiedades(direccion)').order('fecha').order('hora');
    const hoyEvt = (eventos||[]).filter(e => e.fecha === hoy);
    const proximos = (eventos||[]).filter(e => e.fecha > hoy).slice(0,5);
    const colores = { 'Visita':'#3b82f6','Firma':'#10b981','Entrega de llaves':'#f59e0b','Inspección':'#8b5cf6' };
    document.getElementById('content').innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn btn-primary" onclick="formAgenda()">+ Nuevo evento</button>
      </div>
      <div class="card">
        <div class="card-title">📅 Hoy — ${new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div>
        ${hoyEvt.length === 0 ? '<div class="empty"><div class="empty-icon">✅</div><div>Sin eventos hoy.</div></div>' :
        hoyEvt.map(e=>{const c=colores[e.tipo]||'#3b82f6';return`
          <div style="display:flex;gap:12px;align-items:center;border-left:3px solid ${c};padding-left:12px;margin-bottom:12px">
            <div style="font-size:12px;color:${c};font-weight:700;min-width:42px">${e.hora?.slice(0,5)||'—'}</div>
            <div style="flex:1"><b style="font-size:13px">${e.tipo}</b><br>
              <small style="color:var(--muted)">${e.descripcion||''} ${e.propiedades?.direccion?'— '+e.propiedades.direccion:''}</small><br>
              <small style="color:var(--dim)">👤 ${e.cliente||''}</small></div>
            <button class="btn btn-ghost btn-sm" onclick="deleteAgenda('${e.id}')">🗑️</button>
          </div>`}).join('')}
      </div>
      ${proximos.length > 0 ? `<div class="card">
        <div class="card-title">📆 Próximos eventos</div>
        ${proximos.map(e=>{const c=colores[e.tipo]||'#3b82f6';return`
          <div style="display:flex;gap:12px;align-items:center;border-left:3px solid ${c};padding-left:12px;margin-bottom:12px">
            <div style="font-size:11px;color:${c};font-weight:700;min-width:60px">${new Date(e.fecha+'T12:00').toLocaleDateString('es-AR',{day:'numeric',month:'short'})}</div>
            <div style="flex:1"><b>${e.tipo}</b><br><small style="color:var(--muted)">${e.descripcion||''}</small></div>
          </div>`}).join('')}
      </div>` : ''}`;
  }
};

// ─── FORMS ───────────────────────────────────────────────────────────────────
function formPropiedad(data={}) {
  openModal(data.id ? 'Editar propiedad' : 'Nueva propiedad', `
    <div class="form-group"><label>Dirección *</label><input id="f-dir" value="${data.direccion||''}" placeholder="Ej: Corrientes 1540 3°A"></div>
    <div class="form-group"><label>Tipo</label><select id="f-tipo">
      <option ${data.tipo==='Departamento'?'selected':''}>Departamento</option>
      <option ${data.tipo==='Casa'?'selected':''}>Casa</option>
      <option ${data.tipo==='Local'?'selected':''}>Local</option>
      <option ${data.tipo==='Oficina'?'selected':''}>Oficina</option>
      <option ${data.tipo==='Cochera'?'selected':''}>Cochera</option>
    </select></div>
    <div class="form-group"><label>Propietario</label><input id="f-prop" value="${data.propietario||''}" placeholder="Apellido, Nombre"></div>
    <div class="form-group"><label>Inquilino</label><input id="f-inq" value="${data.inquilino||''}" placeholder="Apellido, Nombre"></div>
    <div class="form-group"><label>Alquiler mensual $</label><input id="f-alq" type="number" value="${data.alquiler||''}" placeholder="0"></div>
    <div class="form-group"><label>Estado</label><select id="f-est">
      <option ${data.estado==='Al día'?'selected':''}>Al día</option>
      <option ${data.estado==='Mora'?'selected':''}>Mora</option>
      <option ${data.estado==='Disponible'?'selected':''}>Disponible</option>
    </select></div>
    <div class="form-group"><label>Vencimiento contrato</label><input id="f-venc" type="date" value="${data.fecha_vencimiento||''}"></div>
    <div class="form-group"><label>Índice ajuste</label><select id="f-idx">
      <option ${data.indice==='ICL'?'selected':''}>ICL</option>
      <option ${data.indice==='IPC'?'selected':''}>IPC</option>
      <option ${data.indice==='ICL/IPC'?'selected':''}>ICL/IPC</option>
    </select></div>`,
    async () => {
      const row = {
        direccion: document.getElementById('f-dir').value,
        tipo: document.getElementById('f-tipo').value,
        propietario: document.getElementById('f-prop').value,
        inquilino: document.getElementById('f-inq').value,
        alquiler: document.getElementById('f-alq').value || 0,
        estado: document.getElementById('f-est').value,
        fecha_vencimiento: document.getElementById('f-venc').value || null,
        indice: document.getElementById('f-idx').value,
      };
      if (!row.direccion) { alert('La dirección es obligatoria'); return; }
      if (data.id) await sb.from('propiedades').update(row).eq('id', data.id);
      else await sb.from('propiedades').insert(row);
      closeModal(); navigate('propiedades');
    });
}

async function editPropiedad(id) {
  const { data } = await sb.from('propiedades').select('*').eq('id', id).single();
  formPropiedad(data);
}

async function deletePropiedad(id) {
  if (!confirm('¿Eliminar esta propiedad?')) return;
  await sb.from('propiedades').delete().eq('id', id);
  navigate('propiedades');
}

async function formCobranza() {
  const { data: props } = await sb.from('propiedades').select('id, direccion');
  const opts = (props||[]).map(p=>`<option value="${p.id}">${p.direccion}</option>`).join('');
  openModal('Registrar cobro', `
    <div class="form-group"><label>Propiedad</label><select id="f-pid">${opts}</select></div>
    <div class="form-group"><label>Mes (ej: Junio 2026)</label><input id="f-mes" placeholder="Junio 2026"></div>
    <div class="form-group"><label>Monto $</label><input id="f-monto" type="number" placeholder="0"></div>
    <div class="form-group"><label>Estado</label><select id="f-cest">
      <option>Cobrado</option><option>Pendiente</option><option>Mora</option>
    </select></div>
    <div class="form-group"><label>Fecha cobro</label><input id="f-fech" type="date"></div>`,
    async () => {
      const row = {
        propiedad_id: document.getElementById('f-pid').value,
        mes: document.getElementById('f-mes').value,
        monto: document.getElementById('f-monto').value || 0,
        estado: document.getElementById('f-cest').value,
        fecha_cobro: document.getElementById('f-fech').value || null,
      };
      await sb.from('cobranzas').insert(row);
      closeModal(); navigate('cobranzas');
    });
}

async function deleteCobranza(id) {
  if (!confirm('¿Eliminar este cobro?')) return;
  await sb.from('cobranzas').delete().eq('id', id);
  navigate('cobranzas');
}

async function formAgenda() {
  const { data: props } = await sb.from('propiedades').select('id, direccion');
  const opts = `<option value="">Sin propiedad</option>` + (props||[]).map(p=>`<option value="${p.id}">${p.direccion}</option>`).join('');
  openModal('Nuevo evento', `
    <div class="form-group"><label>Tipo</label><select id="f-tipo">
      <option>Visita</option><option>Firma</option><option>Entrega de llaves</option><option>Inspección</option><option>Otro</option>
    </select></div>
    <div class="form-group"><label>Descripción</label><input id="f-desc" placeholder="Detalles del evento"></div>
    <div class="form-group"><label>Cliente</label><input id="f-cli" placeholder="Apellido, Nombre"></div>
    <div class="form-group"><label>Propiedad</label><select id="f-pid">${opts}</select></div>
    <div class="form-group"><label>Fecha</label><input id="f-fecha" type="date"></div>
    <div class="form-group"><label>Hora</label><input id="f-hora" type="time"></div>`,
    async () => {
      const row = {
        tipo: document.getElementById('f-tipo').value,
        descripcion: document.getElementById('f-desc').value,
        cliente: document.getElementById('f-cli').value,
        propiedad_id: document.getElementById('f-pid').value || null,
        fecha: document.getElementById('f-fecha').value || null,
        hora: document.getElementById('f-hora').value || null,
      };
      await sb.from('agenda').insert(row);
      closeModal(); navigate('agenda');
    });
}

async function deleteAgenda(id) {
  if (!confirm('¿Eliminar este evento?')) return;
  await sb.from('agenda').delete().eq('id', id);
  navigate('agenda');
}
</script>
</body>
</html>
